<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes" />
  <title>Ficha de Treino • Laís Camilla ✨</title>
  
  <!-- Fonte moderna e ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0a14;
      --bg-secondary: #14141f;
      --surface: #1e1e2d;
      --surface-light: #2a2a3a;
      --text-primary: #ffffff;
      --text-secondary: #e0e0e0;
      --accent-pink: #ff69b4;
      --accent-purple: #b77bff;
      --accent-gradient: linear-gradient(135deg, #ff69b4 0%, #b77bff 100%);
      --success: #10b981;
      --success-gradient: linear-gradient(135deg, #34d399 0%, #10b981 100%);
      --warning: #f59e0b;
      --warning-gradient: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      --danger: #ef4444;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      --border: 1px solid #3a3a4a;
      --blur: blur(10px);
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: linear-gradient(120deg, #ff1493, #8b5cf6);
      border-bottom: var(--border);
    }

    .header-content {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      min-width: 0;
      flex: 1;
    }

    .logo {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: white;
      flex-shrink: 0;
      border: 2px solid rgba(255,255,255,0.3);
    }

    .foto-perfil {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .brand-text {
      min-width: 0;
      flex: 1;
    }

    .brand-text h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: white;
      text-shadow: 0 1px 3px rgba(0,0,0,0.3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 0.25rem;
    }

    .student-info {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.25rem;
    }

    .info-item {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background: rgba(255, 255, 255, 0.15);
      padding: 0.35rem 0.7rem;
      border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.2);
      font-size: 0.75rem;
      backdrop-filter: var(--blur);
      color: white;
      font-weight: 500;
    }

    .info-item i {
      color: white;
      font-size: 0.7rem;
      opacity: 0.9;
    }

    .info-item strong {
      color: white;
      font-weight: 700;
      margin-left: 0.1rem;
    }

    .info-item.warning {
      background: rgba(245, 158, 11, 0.3);
      border-color: var(--warning);
      animation: pulse 2s infinite;
    }

    .info-item.warning i {
      color: var(--warning);
    }

    .info-item.danger {
      background: rgba(239, 68, 68, 0.3);
      border-color: var(--danger);
      animation: pulse 1s infinite;
    }

    .info-item.danger i {
      color: var(--danger);
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.7; }
      100% { opacity: 1; }
    }

    .date-badge {
      background: rgba(0,0,0,0.3);
      backdrop-filter: var(--blur);
      color: white;
      font-weight: 600;
      padding: 0.5rem 0.75rem;
      border-radius: 100px;
      font-size: 0.8rem;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .date-badge i {
      font-size: 0.75rem;
    }

    .container {
      max-width: 1280px;
      margin: 1rem auto;
      padding: 0 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card {
      background: var(--surface);
      border: var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .card-header {
      padding: 1rem 1.25rem;
      border-bottom: var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .card-header h2 {
      font-size: 1.1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .card-header h2 i {
      color: var(--accent-pink);
    }

    .card-content {
      padding: 1.25rem;
    }

    .progress-text {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.5rem;
      color: var(--text-secondary);
      font-size: 0.85rem;
      font-weight: 500;
    }

    .progress-container {
      background: var(--surface-light);
      border-radius: 100px;
      height: 8px;
      width: 100%;
      margin-bottom: 1.25rem;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(135deg, #34d399, #10b981);
      border-radius: 100px;
      transition: width 0.3s ease;
      width: 0%;
    }

    .info-box {
      background: var(--surface-light);
      border: var(--border);
      border-radius: var(--radius-md);
      padding: 0.75rem 1rem;
      margin-bottom: 1.25rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      font-size: 0.85rem;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .info-item i {
      color: var(--accent-pink);
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--surface-light);
      padding: 0.6rem 1rem;
      border-radius: 100px;
      border: var(--border);
      margin-bottom: 1.25rem;
    }

    .search-box i {
      color: var(--accent-pink);
      font-size: 0.9rem;
    }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-size: 0.95rem;
      outline: none;
    }

    .search-box input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .exercise-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .exercise-item {
      background: var(--surface-light);
      border: var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .exercise-item.completed {
      border-color: #10b981;
      background: rgba(16, 185, 129, 0.1);
    }

    .exercise-header {
      width: 100%;
      padding: 1rem;
      background: transparent;
      border: none;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      cursor: pointer;
    }

    .exercise-info {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      flex: 1;
      min-width: 0;
    }

    .exercise-number {
      width: 36px;
      height: 36px;
      background: var(--surface);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: var(--accent-pink);
      border: var(--border);
      flex-shrink: 0;
      font-size: 0.9rem;
    }

    .exercise-name {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 0.2rem;
      word-break: break-word;
    }

    .exercise-meta {
      display: flex;
      gap: 0.75rem;
      color: var(--text-secondary);
      font-size: 0.8rem;
      flex-wrap: wrap;
    }

    .exercise-meta span {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      background: rgba(0, 0, 0, 0.3);
      padding: 0.2rem 0.5rem;
      border-radius: 20px;
    }

    .exercise-meta i {
      color: var(--accent-pink);
      font-size: 0.7rem;
    }

    .exercise-timestamp {
      font-size: 0.7rem;
      color: var(--success);
      margin-top: 0.2rem;
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }

    .exercise-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .btn-complete {
      background: var(--surface);
      border: var(--border);
      color: var(--text-secondary);
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1rem;
    }

    .btn-complete.completed {
      background: linear-gradient(135deg, #34d399, #10b981);
      color: white;
      border: none;
    }

    .chevron {
      width: 32px;
      height: 32px;
      background: var(--surface);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      border: var(--border);
      transition: var(--transition);
    }

    .exercise-item.open .chevron {
      transform: rotate(180deg);
      background: var(--accent-gradient);
      color: white;
      border: none;
    }

    .exercise-panel {
      display: none;
      padding: 1rem;
      border-top: var(--border);
      background: var(--surface);
    }

    .exercise-item.open .exercise-panel {
      display: block;
    }

    .media-container {
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-bottom: 1rem;
      border: var(--border);
      aspect-ratio: 16/9;
      background: var(--surface-light);
    }

    .media-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .action-buttons {
      display: flex;
      gap: 0.75rem;
    }

    .btn {
      flex: 1;
      padding: 0.7rem 1rem;
      border-radius: 100px;
      border: none;
      font-weight: 600;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      cursor: pointer;
      text-decoration: none;
      background: var(--surface);
      color: var(--text-primary);
      border: var(--border);
    }

    .btn-youtube {
      background: #ff0000;
      color: white;
    }

    .history-filters {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: var(--surface-light);
      border: var(--border);
      color: var(--text-secondary);
      padding: 0.4rem 0.8rem;
      border-radius: 100px;
      font-size: 0.75rem;
      cursor: pointer;
    }

    .filter-btn.active {
      background: var(--accent-gradient);
      color: white;
      border: none;
    }

    .history-item {
      font-size: 0.8rem;
      padding: 0.6rem;
      margin: 0.4rem 0;
      background: var(--surface-light);
      border-radius: var(--radius-sm);
      border-left: 3px solid var(--accent-pink);
    }

    .history-date {
      color: var(--text-secondary);
      font-size: 0.7rem;
      margin-top: 0.2rem;
      background: rgba(255, 255, 255, 0.1);
      padding: 0.15rem 0.4rem;
      border-radius: 100px;
      display: inline-block;
    }

    .stats-number {
      font-size: 1.5rem;
      font-weight: 700;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .alert-banner {
      background: var(--warning-gradient);
      color: white;
      padding: 0.75rem;
      border-radius: var(--radius-md);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-weight: 600;
      font-size: 0.85rem;
      animation: pulse 2s infinite;
    }

    footer {
      margin: 1.5rem 1rem;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <div class="brand">
        <div class="logo">
          <img src="https://i.postimg.cc/htNwRF2h/Captura-de-tela-2026-02-21-112042.png" alt="Laís" class="foto-perfil">
        </div>
        <div class="brand-text">
          <h1>Laís Camilla</h1>
          <div class="student-info" id="student-info-mobile">
            <!-- Info será preenchida via JS -->
          </div>
        </div>
      </div>
      <div class="date-badge" id="current-date-badge">
        <i class="fas fa-calendar-day"></i>
        <span>...</span>
      </div>
    </div>
  </header>

  <div class="container">
    <main>
      <div class="card">
        <div class="card-header">
          <h2><i class="fas fa-dumbbell"></i> Programa A</h2>
          <span class="badge" style="background:var(--surface-light);padding:0.4rem 0.8rem;border-radius:100px;font-size:0.75rem;">
            <i class="fas fa-clock"></i> 45s
          </span>
        </div>
        
        <div class="card-content">
          <div id="ficha-alert" style="display: none;"></div>
          
          <div class="progress-text">
            <span><i class="fas fa-check-circle"></i> Progresso</span>
            <span id="progress-count">0/13</span>
          </div>
          <div class="progress-container">
            <div class="progress-bar" id="progress-bar" style="width: 0%;"></div>
          </div>

          <div class="info-box">
            <span><i class="fas fa-heart"></i> Alongamentos: 1,4,8,9,12</span>
            <span><i class="fas fa-star"></i> Total: 13</span>
          </div>

          <div class="search-box">
            <i class="fas fa-search"></i>
            <input id="q" type="search" placeholder="Buscar exercício..." />
          </div>

          <div id="list" class="exercise-list"></div>
        </div>
      </div>
    </main>

    <aside>
      <div class="card">
        <div class="card-header">
          <h2><i class="fas fa-history"></i> Histórico</h2>
          <button class="filter-btn" id="clear-history-btn" style="padding:0.3rem 0.6rem;">
            <i class="fas fa-trash"></i>
          </button>
        </div>
        <div class="card-content">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
            <span style="color:var(--text-secondary);">Total:</span>
            <span class="stats-number" id="total-records">0</span>
          </div>
          
          <div class="history-filters">
            <button class="filter-btn active" data-filter="all">Todos</button>
            <button class="filter-btn" data-filter="today">Hoje</button>
            <button class="filter-btn" data-filter="week">Semana</button>
            <button class="filter-btn" data-filter="month">Mês</button>
          </div>
          
          <div id="history-list" style="max-height: 300px; overflow-y: auto;"></div>
        </div>
      </div>
    </aside>
  </div>

  <footer>
    <i class="fas fa-heart" style="color:var(--accent-pink);"></i> 13 exercícios • Histórico permanente
  </footer>

  <script>
    // Elementos DOM
    const list = document.getElementById("list");
    const q = document.getElementById("q");
    const progressCount = document.getElementById("progress-count");
    const progressBar = document.getElementById("progress-bar");
    const currentDateBadge = document.getElementById("current-date-badge");
    const historyList = document.getElementById("history-list");
    const clearHistoryBtn = document.getElementById("clear-history-btn");
    const totalRecords = document.getElementById("total-records");
    const filterBtns = document.querySelectorAll('.filter-btn');
    const studentInfoMobile = document.getElementById("student-info-mobile");
    const fichaAlert = document.getElementById("ficha-alert");

    let currentFilter = 'all';
    
    // Dados da aluna
    const ALUNA = {
      nome: "Laís Camilla",
      nascimento: "2001-01-09",
      dataInicio: "2026-02-21",
      dataTrocaFicha: "2026-03-09",
      professor: "Personal"
    };

    function formatDateBr(dateStr) {
      if (!dateStr) return '';
      const [year, month, day] = dateStr.split('-');
      return `${day}/${month}/${year}`;
    }

    function calcularIdade(dataNascimento) {
      if (!dataNascimento) return 0;
      const [ano, mes, dia] = dataNascimento.split('-');
      const nasc = new Date(ano, mes - 1, dia);
      const hoje = new Date();
      let idade = hoje.getFullYear() - nasc.getFullYear();
      const mesDiff = hoje.getMonth() - nasc.getMonth();
      if (mesDiff < 0 || (mesDiff === 0 && hoje.getDate() < nasc.getDate())) idade--;
      return idade;
    }

    function calcularDiasParaTrocaFicha(dataTroca) {
      if (!dataTroca) return 0;
      const hoje = new Date();
      const [ano, mes, dia] = dataTroca.split('-');
      const troca = new Date(ano, mes - 1, dia);
      const diffTime = troca - hoje;
      return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
    }

    function renderStudentInfo() {
      const idade = calcularIdade(ALUNA.nascimento);
      const diasParaTroca = calcularDiasParaTrocaFicha(ALUNA.dataTrocaFicha);
      
      let alertClass = '';
      let alertIcon = 'fa-calendar-check';
      let alertText = '';
      
      if (diasParaTroca <= 0) {
        alertClass = 'danger';
        alertIcon = 'fa-exclamation-triangle';
        alertText = 'VENCIDA!';
        fichaAlert.style.display = 'block';
        fichaAlert.innerHTML = `<div class="alert-banner"><i class="fas fa-exclamation-triangle"></i> FICHA VENCIDA! ⚠️</div>`;
      } else if (diasParaTroca <= 7) {
        alertClass = 'warning';
        alertIcon = 'fa-clock';
        alertText = `Faltam ${diasParaTroca}`;
        fichaAlert.style.display = 'block';
        fichaAlert.innerHTML = `<div class="alert-banner"><i class="fas fa-clock"></i> Faltam ${diasParaTroca} dias ⏰</div>`;
      } else {
        fichaAlert.style.display = 'none';
      }
      
      studentInfoMobile.innerHTML = `
        <span class="info-item"><i class="fas fa-birthday-cake"></i> ${formatDateBr(ALUNA.nascimento)} (${idade})</span>
        <span class="info-item"><i class="fas fa-calendar-plus"></i> Início: ${formatDateBr(ALUNA.dataInicio)}</span>
        <span class="info-item ${alertClass}"><i class="fas ${alertIcon}"></i> Troca: ${formatDateBr(ALUNA.dataTrocaFicha)} ${alertText}</span>
        <span class="info-item"><i class="fas fa-user-tie"></i> ${ALUNA.professor}</span>
      `;
    }

    function getCurrentDate() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }
    
    function formatDateForDisplay(dateStr) {
      const [year, month, day] = dateStr.split('-');
      const date = new Date(year, month - 1, day);
      const dias = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
      return `${dias[date.getDay()].substring(0,3)}, ${day}/${month}`;
    }

    function getCurrentDateTime() {
      const now = new Date();
      return `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    }
    
    const today = getCurrentDate();
    currentDateBadge.innerHTML = `<i class="fas fa-calendar-day"></i> <span>${formatDateForDisplay(today)}</span>`;
    renderStudentInfo();
    
    const lastVisit = localStorage.getItem('lais_lastVisitDate');
    if (lastVisit !== today) {
      localStorage.removeItem('lais_completedExercises');
      localStorage.setItem('lais_lastVisitDate', today);
    }
    
    let completedExercises = JSON.parse(localStorage.getItem('lais_completedExercises')) || {};
    let permanentHistory = JSON.parse(localStorage.getItem('lais_permanentHistory')) || [];

    const DATA = {
      items: [
        { n:1, name:"Remada articulada (pegada neutra)", sets:"3", reps:"12", load:"3kg", id:"i3FScctBKvc" },
        { n:2, name:"Leg Press 45°", sets:"3", reps:"12", load:"20kg", id:"waAxlYvtCcI" },
        { n:3, name:"Pulley convergente", sets:"3", reps:"12", load:"10kg", id:"jmzKXyZ5uxo" },
        { n:4, name:"Agachamento taça", sets:"3", reps:"20", load:"7kg", id:"Vkbmyd1bK3U" },
        { n:5, name:"Flexão tibial (cadeira flexora)", sets:"2", reps:"20", load:"3kg", id:"vWFHYnVdBp4" },
        { n:6, name:"Rosca bíceps com halteres", sets:"2", reps:"12", load:"3kg", id:"ls1JIY9QmRA" },
        { n:7, name:"Cadeira abdutora", sets:"3", reps:"20", load:"5 placas", id:"e2gmqTG1OgQ" },
        { n:8, name:"Tríceps testa", sets:"3", reps:"12", load:"4kg", id:"VakpIeaaeXA" },
        { n:9, name:"Cadeira extensora", sets:"3", reps:"12", load:"3 placas", id:"y6juG3XuRe4" },
        { n:10, name:"Voador frontal (Peck Deck - peitoral)", sets:"3", reps:"12", load:"1 placa", id:"a5XwjsD3AOI" },
        { n:11, name:"Leg Press 180°", sets:"3", reps:"12", load:"3 placas", id:"M_jE3m8LcQ8" },
        { n:12, name:"Pulley supinado", sets:"3", reps:"12", load:"3 placas", id:"zg1MSZR-y4Y" },
        { n:13, name:"Prancha abdominal", sets:"2", reps:"30s", load:"—", id:"DoOtkRaL1BI" }
      ]
    };

    function getExerciseKey(exercise) { return `A-${exercise.n}`; }

    function isSameWeek(date1, date2) {
      const d1 = new Date(date1), d2 = new Date(date2);
      const d1Week = Math.floor((d1 - new Date(d1.getFullYear(),0,1)) / (7*24*60*60*1000));
      const d2Week = Math.floor((d2 - new Date(d2.getFullYear(),0,1)) / (7*24*60*60*1000));
      return d1Week === d2Week && d1.getFullYear() === d2.getFullYear();
    }

    function isSameMonth(date1, date2) {
      const d1 = new Date(date1), d2 = new Date(date2);
      return d1.getMonth() === d2.getMonth() && d1.getFullYear() === d2.getFullYear();
    }

    function filterHistoryByDate(entries, filter) {
      const todayStr = getCurrentDate();
      return entries.filter(entry => {
        switch(filter) {
          case 'today': return entry.date === todayStr;
          case 'week': return isSameWeek(entry.date, todayStr);
          case 'month': return isSameMonth(entry.date, todayStr);
          default: return true;
        }
      });
    }

    function addToHistory(exercise) {
      permanentHistory.unshift({
        id: Date.now() + Math.random(),
        exerciseNumber: exercise.n,
        exerciseName: exercise.name,
        time: getCurrentDateTime(),
        date: today
      });
      localStorage.setItem('lais_permanentHistory', JSON.stringify(permanentHistory));
      updateTotalRecords();
      renderHistory(currentFilter);
    }

    function removeFromHistory(exercise) {
      permanentHistory = permanentHistory.filter(e => !(e.exerciseNumber === exercise.n && e.date === today));
      localStorage.setItem('lais_permanentHistory', JSON.stringify(permanentHistory));
      updateTotalRecords();
      renderHistory(currentFilter);
    }

    function updateTotalRecords() {
      totalRecords.textContent = permanentHistory.length;
    }

    function renderHistory(filter = 'all') {
      currentFilter = filter;
      filterBtns.forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.filter === filter) btn.classList.add('active');
      });
      
      const filtered = filterHistoryByDate(permanentHistory, filter);
      if (filtered.length === 0) {
        historyList.innerHTML = '<div style="color:var(--text-secondary);text-align:center;padding:1rem;">Nenhum registro</div>';
        return;
      }
      
      let html = '';
      filtered.forEach(entry => {
        const [y,m,d] = entry.date.split('-');
        html += `<div class="history-item"><i class="fas fa-check-circle" style="color:var(--success);"></i> <strong>#${entry.exerciseNumber}</strong> ${entry.exerciseName}<div><span class="history-date"><i class="fas fa-calendar-alt"></i> ${d}/${m}/${y}</span> <span style="color:var(--success);font-size:0.7rem;"><i class="fas fa-clock"></i> ${entry.time}</span></div></div>`;
      });
      historyList.innerHTML = html;
    }

    function toggleComplete(exercise, button) {
      const key = getExerciseKey(exercise);
      if (completedExercises[key]) {
        delete completedExercises[key];
        button.classList.remove('completed');
        button.innerHTML = '<i class="fas fa-circle"></i>';
        removeFromHistory(exercise);
      } else {
        completedExercises[key] = true;
        button.classList.add('completed');
        button.innerHTML = '<i class="fas fa-check"></i>';
        addToHistory(exercise);
      }
      localStorage.setItem('lais_completedExercises', JSON.stringify(completedExercises));
      button.closest('.exercise-item').classList.toggle('completed');
      updateProgress();
    }

    function updateProgress() {
      const total = DATA.items.length;
      let completed = 0;
      DATA.items.forEach(item => { if (completedExercises[getExerciseKey(item)]) completed++; });
      progressCount.textContent = `${completed}/${total}`;
      progressBar.style.width = total > 0 ? `${(completed/total)*100}%` : '0%';
    }

    function clearAllHistory() {
      if (confirm('Apagar todo histórico?')) {
        completedExercises = {};
        permanentHistory = [];
        localStorage.setItem('lais_completedExercises', '{}');
        localStorage.setItem('lais_permanentHistory', '[]');
        render(); updateTotalRecords(); renderHistory(currentFilter);
      }
    }

    function render() {
      const query = q.value.toLowerCase().trim();
      list.innerHTML = "";
      const items = DATA.items.filter(i => !query || i.name.toLowerCase().includes(query));

      items.forEach(item => {
        const isCompleted = completedExercises[getExerciseKey(item)];
        const todayEntry = permanentHistory.find(e => e.exerciseNumber === item.n && e.date === today);
        
        list.innerHTML += `
          <div class="exercise-item ${isCompleted ? 'completed' : ''}">
            <button class="exercise-header">
              <div class="exercise-info">
                <div class="exercise-number">${item.n}</div>
                <div>
                  <div class="exercise-name">${item.name}</div>
                  <div class="exercise-meta">
                    <span><i class="fas fa-layer-group"></i> ${item.sets}</span>
                    <span><i class="fas fa-repeat"></i> ${item.reps}</span>
                    <span><i class="fas fa-weight-hanging"></i> ${item.load}</span>
                  </div>
                  ${todayEntry ? `<div class="exercise-timestamp"><i class="fas fa-clock"></i> ${todayEntry.time}</div>` : ''}
                </div>
              </div>
              <div class="exercise-actions">
                <div class="btn-complete ${isCompleted ? 'completed' : ''}">${isCompleted ? '<i class="fas fa-check"></i>' : '<i class="fas fa-circle"></i>'}</div>
                <div class="chevron"><i class="fas fa-chevron-down"></i></div>
              </div>
            </button>
            <div class="exercise-panel">
              <div class="media-container"><img src="https://img.youtube.com/vi/${item.id}/hqdefault.jpg" loading="lazy"></div>
              <div class="action-buttons"><a href="https://youtube.com/watch?v=${item.id}" class="btn btn-youtube" target="_blank"><i class="fab fa-youtube"></i> Assistir</a></div>
            </div>
          </div>
        `;
      });

      document.querySelectorAll('.exercise-header').forEach(header => {
        header.addEventListener('click', (e) => {
          e.preventDefault();
          header.closest('.exercise-item').classList.toggle('open');
        });
      });

      document.querySelectorAll('.btn-complete').forEach((btn, idx) => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleComplete(items[idx], btn);
        });
      });

      if (items.length === 0) list.innerHTML = '<div class="empty-state"><i class="fas fa-heart"></i><p>Nenhum exercício</p></div>';
      updateProgress();
    }

    q.addEventListener('input', render);
    clearHistoryBtn.addEventListener('click', clearAllHistory);
    filterBtns.forEach(btn => btn.addEventListener('click', () => renderHistory(btn.dataset.filter)));
    
    render();
    updateTotalRecords();
    renderHistory('all');
  </script>
</body>
</html>
